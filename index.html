<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NFC Gallery</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  overflow: hidden;
}

/* 动态背景 */
body {
  display: flex;
  align-items: center;
  justify-content: center;
  background-size: cover;
  background-position: center;
}

/* 模糊遮罩（你原来的精髓） */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(255, 248, 230, 0.22);
  backdrop-filter: blur(2px);
}

/* 卡片（保留你的审美） */
.card {
  position: relative;
  z-index: 2;
  width: min(86vw, 430px);
  padding: 22px 20px 24px;
  border-radius: 28px;
  background: rgba(255, 255, 255, 0.50);
  backdrop-filter: blur(14px);
  box-shadow: 0 18px 60px rgba(80, 90, 60, 0.22);
  text-align: center;
  border: 1px solid rgba(255, 255, 255, 0.55);
}

.cover {
  width: 100%;
  aspect-ratio: 1 / 1;
  border-radius: 22px;
  object-fit: cover;
  box-shadow: 0 14px 40px rgba(70, 86, 62, 0.28);
}

h1 {
  margin: 18px 0 6px;
  font-size: 22px;
  font-weight: 600;
  color: #42533a;
}

p {
  margin: 0 0 16px;
  font-size: 14px;
  color: rgba(66, 83, 58, 0.78);
}

button {
  width: 100%;
  border: none;
  border-radius: 999px;
  padding: 14px 18px;
  font-size: 17px;
  color: white;
  background: rgba(84, 111, 72, 0.88);
  box-shadow: 0 8px 20px rgba(84, 111, 72, 0.25);
}

button:active {
  transform: scale(0.98);
}
</style>
</head>

<body>

<div class="overlay"></div>

<main class="card">
  <img class="cover" id="cover" />
  <h1 id="title"></h1>
  <p id="status">正在加载...</p>

  <button id="btn">点击播放</button>

  <audio id="audio"></audio>
</main>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id") || "1";

/* ===== 动态资源 ===== */
const audio = document.getElementById("audio");
const cover = document.getElementById("cover");
const title = document.getElementById("title");
const body = document.body;
const status = document.getElementById("status");
const btn = document.getElementById("btn");

const imgPath = `assets/images/${id}.jpg`;
const audioPath = `assets/audio/${id}.mp3`;

/* ===== 绑定资源 ===== */
cover.src = imgPath;
audio.src = audioPath;
body.style.backgroundImage = `url('${imgPath}')`;
title.innerText = `玄觞`;

/* ===== 播放控制 ===== */
let playing = false;

btn.onclick = async () => {
  try {
    if (!playing) {
      await audio.play();
      playing = true;
      btn.innerText = "暂停";
      status.innerText = "正在播放";
    } else {
      audio.pause();
      playing = false;
      btn.innerText = "播放";
      status.innerText = "已暂停";
    }
  } catch (e) {
    status.innerText = "点击后才能播放";
  }
};
</script>

</body>
</html>
