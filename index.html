<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NFC Gallery</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: #f4f0df;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  overflow: hidden;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  background-size: cover;
  background-position: center;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(255, 248, 230, 0.22);
  backdrop-filter: blur(2px);
}

.card {
  position: relative;
  z-index: 2;
  width: min(86vw, 430px);
  padding: 22px 20px 24px;
  border-radius: 28px;
  background: rgba(255, 255, 255, 0.50);
  backdrop-filter: blur(14px);
  box-shadow: 0 18px 60px rgba(80, 90, 60, 0.22);
  text-align: center;
  border: 1px solid rgba(255, 255, 255, 0.55);
}

.cover {
  width: 100%;
  aspect-ratio: 1 / 1;
  border-radius: 22px;
  object-fit: cover;
  display: block;
  box-shadow: 0 14px 40px rgba(70, 86, 62, 0.28);
}

h1 {
  margin: 18px 0 6px;
  font-size: 22px;
  font-weight: 600;
  color: #42533a;
  letter-spacing: 0.04em;
}

p {
  margin: 0 0 16px;
  font-size: 14px;
  color: rgba(66, 83, 58, 0.78);
}

button {
  width: 100%;
  border: none;
  border-radius: 999px;
  padding: 14px 18px;
  font-size: 17px;
  color: white;
  background: rgba(84, 111, 72, 0.88);
  box-shadow: 0 8px 20px rgba(84, 111, 72, 0.25);
}

button:active {
  transform: scale(0.98);
}

audio {
  width: 100%;
  margin-top: 16px;
}
</style>
</head>

<body>

<div class="overlay"></div>

<main class="card">
  <img class="cover" id="cover" alt="cover" />

  <h1 id="title">正在加载...</h1>
  <p id="status">正在准备音频...</p>

  <button id="btn">点击播放</button>

  <audio id="audio" preload="auto" controls></audio>
</main>

<script>
const params = new URLSearchParams(window.location.search);
const rawId = params.get("id") || "1";

const songTitles = {
  "1": "芊芊",
  "2": "陌上花开",
  "3": "故人叹",
  "4": "曾共霜雪",
  "5": "我曾经也想过离开这个世界",
  "6": "话蝶",
  "7": "云梦传奇",
  "8": "戏语花"
};

const id = songTitles[rawId] ? rawId : "1";

const audio = document.getElementById("audio");
const cover = document.getElementById("cover");
const title = document.getElementById("title");
const statusText = document.getElementById("status");
const btn = document.getElementById("btn");

const imgPath = `assets/images/${id}.jpg`;
const audioPath = `assets/audio/${id}.mp3`;

cover.src = imgPath;
document.body.style.backgroundImage = `url("${imgPath}")`;

title.textContent = `玄觞 - ${songTitles[id]}`;
document.title = `玄觞 - ${songTitles[id]}`;

audio.src = audioPath;
audio.load();

let autoplayTried = false;

function getAudioErrorMessage() {
  if (!audio.error) return "未知音频错误";

  switch (audio.error.code) {
    case 1:
      return "音频加载被中止";
    case 2:
      return "网络错误，音频没有加载成功";
    case 3:
      return "音频文件损坏或格式无法解码";
    case 4:
      return "音频路径错误、文件不存在，或格式不支持";
    default:
      return "未知音频错误";
  }
}

async function playAudio(fromAutoplay = false) {
  try {
    await audio.play();

    statusText.textContent = "正在播放";
    btn.textContent = "暂停";
  } catch (error) {
    if (audio.error) {
      statusText.textContent = getAudioErrorMessage();
    } else if (fromAutoplay) {
      statusText.textContent = "手机浏览器限制自动播放，请点击下方按钮播放";
    } else {
      statusText.textContent = "播放失败，请检查 MP3 是否上传成功";
    }

    btn.textContent = "点击播放";
  }
}

audio.addEventListener("loadedmetadata", () => {
  statusText.textContent = "音频已加载，正在尝试自动播放...";
});

audio.addEventListener("canplay", () => {
  if (!autoplayTried) {
    autoplayTried = true;
    playAudio(true);
  }
});

audio.addEventListener("playing", () => {
  statusText.textContent = "正在播放";
  btn.textContent = "暂停";
});

audio.addEventListener("pause", () => {
  if (!audio.ended) {
    statusText.textContent = "已暂停";
    btn.textContent = "继续播放";
  }
});

audio.addEventListener("ended", () => {
  statusText.textContent = "播放结束";
  btn.textContent = "重新播放";
});

audio.addEventListener("error", () => {
  statusText.textContent = getAudioErrorMessage();
  btn.textContent = "音频加载失败";
});

btn.addEventListener("click", async () => {
  if (audio.paused) {
    await playAudio(false);
  } else {
    audio.pause();
  }
});

window.addEventListener("load", () => {
  setTimeout(() => {
    if (!autoplayTried) {
      autoplayTried = true;
      playAudio(true);
    }
  }, 500);
});
</script>

</body>
</html>
